name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > tilawa.jks
      - name: Build and Patch
        run: |
          mkdir -p www
          cp index.html www/
          cp banque_sourates.js www/ 2>/dev/null || true
          cp -r data www/ 2>/dev/null || true

          echo "=== Contenu de la racine du repo ==="
          ls -la

          echo "=== Contenu du dossier data/ (avant copie) ==="
          ls -la data/ || echo "ERREUR: le dossier data/ n'existe pas a la racine"

          cp -r data www/

          echo "=== Contenu de www/ apres copie ==="
          ls -la www/
          echo "=== Contenu de www/data/ apres copie ==="
          ls -la www/data/ || echo "ERREUR: www/data/ n'existe pas apres la copie"

          if [ ! -f "www/data/banque_sourates.js" ]; then
            echo "ERREUR FATALE: www/data/banque_sourates.js est absent. Arret du build."
            exit 1
          fi
          echo "OK: www/data/banque_sourates.js present, taille:"
          wc -c www/data/banque_sourates.js

          cp *.mp3 www/ 2>/dev/null || true
          echo '{"name":"tilawa","version":"1.0.0","private":true}' > package.json
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5 @capacitor-community/speech-recognition@5
          python3 -c "import json; open('capacitor.config.json','w').write(json.dumps({'appId':'com.tilawa.sourates','appName':'Tilawa','webDir':'www','androidScheme':'https','android':{'allowMixedContent':True}}, indent=2))"
          npx cap add android
          npx cap sync android

          echo "=== Contenu de android/app/src/main/assets/public/ apres cap sync ==="
          ls -la android/app/src/main/assets/public/ || true
          echo "=== Contenu de android/app/src/main/assets/public/data/ apres cap sync ==="
          ls -la android/app/src/main/assets/public/data/ || echo "ERREUR: data/ absent dans les assets Android apres cap sync"

          GRADLE_FILE="android/app/build.gradle"
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" "$GRADLE_FILE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.${{ github.run_number }}\"/" "$GRADLE_FILE"
          MANIFEST=$(find android/app -name "AndroidManifest.xml" | head -1)
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <application|' "$MANIFEST"
          cat > MainActivity.java << 'JAVAEOF'
          package com.tilawa.sourate;
          import com.getcapacitor.BridgeActivity;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import com.getcapacitor.community.speechrecognition.SpeechRecognition;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(SpeechRecognition.class);
                  super.onCreate(savedInstanceState);
                  WebView webView = getBridge().getWebView();
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                  });
              }
          }
          JAVAEOF
          cp MainActivity.java android/app/src/main/java/com/tilawa/sourate/MainActivity.java
          cp tilawa.jks android/app/tilawa.jks
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/tilawa.jks" \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: mon-apk
          path: android/app/build/outputs/apk/release/app-release.apk
